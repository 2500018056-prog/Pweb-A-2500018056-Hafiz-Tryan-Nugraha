<!DOCTYPE html>
<html>
<head>
<title>Layout CSS</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Header */
.header {
  background-color: #dddddd;
  text-align: center;
  padding: 20px;
  border: 1px solid black;
}

/* Baris */
.row {
  display: flex;
}

/* Kolom */
.column {
  flex: 33.33%;
  padding: 20px;
  height: 200px;
  border: 1px solid black;
  background-color: #f5f5f5;
}

/* Footer */
.footer {
  background-color: #dddddd;
  text-align: center;
  padding: 15px;
  border: 1px solid black;
}
</style>

</head>
<body>

<!-- Header -->
<div class="header">
  <h1>HEADER</h1>
  <p>Layout CSS 3 Kolom 2 Baris</p>
</div>

<!-- Baris Pertama -->
<div class="row">

  <div class="column">
    <h2>Kolom 1</h2>
    <p>Informasi profil website.</p>
  </div>

  <div class="column">
    <h2>Kolom 2</h2>
    <p>Informasi menu navigasi.</p>
  </div>

  <div class="column">
    <h2>Kolom 3</h2>
    <p>Informasi artikel terbaru.</p>
  </div>

</div>

<!-- Baris Kedua -->
<div class="row">

  <div class="column">
    <h2>Kolom 4</h2>
    <p>Informasi galeri website.</p>
  </div>

  <div class="column">
    <h2>Kolom 5</h2>
    <p>Informasi kontak website.</p>
  </div>

  <div class="column">
    <h2>Kolom 6</h2>
    <p>Informasi tambahan lainnya.</p>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <h2>FOOTER</h2>
</div>

</body>
</html>
