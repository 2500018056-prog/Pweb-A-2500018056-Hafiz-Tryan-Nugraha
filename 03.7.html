   <title>Tag Atribut 2 Superscript dan Subscript</title>

<body>
 
<h2>Contoh Penggunaan Superscript dan Subscript</h2>

<p> (x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup> = x<sub>1</sub><sup>2</sup> + x<sub>2</sub><sup>2</sup> + 2x<sub>1</sub>x<sub>2</sub></p>
<p>2H<sub>2</sub> + 0<sub>2</sub> = 2 H<sub>2</sub>o

<hr>
<p>Rumus matematika: a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup></p>
<p>Rumus kimia air: H<sub>2</sub>O</p>
<p>Rumus kimia karbon dioksida: CO<sub>2</sub></p>
 
</body>
